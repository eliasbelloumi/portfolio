<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08090C"/>
      <stop offset="100%" style="stop-color:#0F1015"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C5CBF"/>
      <stop offset="100%" style="stop-color:#0EA5C9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="270" fill="#0EA5C9" opacity="0.7"/>

  <!-- Greeting -->
  <text x="104" y="216" font-family="'JetBrains Mono', monospace" font-size="18" fill="#8A909E" letter-spacing="2">// portfolio</text>

  <!-- Name -->
  <text x="104" y="305" font-family="'Space Grotesk', system-ui, sans-serif" font-size="72" font-weight="700" fill="url(#nameGrad)" letter-spacing="-1">Elias Belloumi</text>

  <!-- Title -->
  <text x="106" y="360" font-family="'JetBrains Mono', monospace" font-size="24" fill="#0EA5C9">AI &amp; Data Science · Bioinformatics</text>

  <!-- Tags -->
  <rect x="104" y="390" width="110" height="34" rx="6" fill="rgba(14,165,201,0.12)" stroke="rgba(14,165,201,0.3)" stroke-width="1"/>
  <text x="159" y="412" font-family="monospace" font-size="14" fill="#0EA5C9" text-anchor="middle">Python</text>

  <rect x="226" y="390" width="80" height="34" rx="6" fill="rgba(124,92,191,0.12)" stroke="rgba(124,92,191,0.3)" stroke-width="1"/>
  <text x="266" y="412" font-family="monospace" font-size="14" fill="#7C5CBF" text-anchor="middle">ML</text>

  <rect x="318" y="390" width="80" height="34" rx="6" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="358" y="412" font-family="monospace" font-size="14" fill="#10B981" text-anchor="middle">R</text>

  <rect x="410" y="390" width="130" height="34" rx="6" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <text x="475" y="412" font-family="monospace" font-size="14" fill="#C9A84C" text-anchor="middle">Research</text>

  <!-- Domain -->
  <text x="104" y="468" font-family="'JetBrains Mono', monospace" font-size="18" fill="#4A5060">eliasbelloumi.com</text>

  <!-- Right side decoration — subtle Voronoi-like circles -->
  <circle cx="980" cy="315" r="180" fill="none" stroke="rgba(14,165,201,0.06)" stroke-width="1"/>
  <circle cx="980" cy="315" r="130" fill="none" stroke="rgba(124,92,191,0.08)" stroke-width="1"/>
  <circle cx="980" cy="315" r="80" fill="none" stroke="rgba(14,165,201,0.10)" stroke-width="1"/>
  <circle cx="980" cy="315" r="6" fill="rgba(124,92,191,0.55)"/>
  <circle cx="1060" cy="220" r="4" fill="rgba(14,165,201,0.4)"/>
  <circle cx="890" cy="260" r="3" fill="rgba(14,165,201,0.3)"/>
  <circle cx="1020" cy="390" r="5" fill="rgba(124,92,191,0.35)"/>
  <circle cx="930" cy="370" r="3" fill="rgba(14,165,201,0.25)"/>
  <circle cx="1080" cy="310" r="4" fill="rgba(14,165,201,0.3)"/>
</svg>
